    <!-- Sitewide Organization Structured Data (valid on every page) -->
    <script type="application/ld+json">

      "@context": "https://schema.org",
      "@type": "Organization",
      "@id": "https://fathersonhomes.com/#organization",

        { "@type": "AdministrativeArea", "name": "Los Angeles County, CA" },

    <!-- WebSite Structured Data -->
    <script type="application/ld+json">

      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Father & Son Home Buyers",
      "url": "https://fathersonhomes.com",

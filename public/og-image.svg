<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#edede9"/>
      <stop offset="100%" stop-color="#e0e0db"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a47551"/>
      <stop offset="100%" stop-color="#c49068"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="url(#accent)"/>

  <!-- Subtle grid texture -->
  <rect width="1200" height="630" fill="none" stroke="#2f3130" stroke-width="0.3" stroke-opacity="0.04"
        stroke-dasharray="none"
        style="background-image: repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(47,49,48,0.04) 40px), repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(47,49,48,0.04) 40px);"/>

  <!-- Top decorative line -->
  <line x1="80" y1="80" x2="320" y2="80" stroke="#a47551" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Eyebrow text -->
  <text x="80" y="115" font-family="Georgia, serif" font-size="18" fill="#a47551" letter-spacing="4" font-weight="400">SOUTHERN CALIFORNIA</text>

  <!-- Main headline -->
  <text x="80" y="200" font-family="Georgia, serif" font-size="64" fill="#2f3130" font-weight="500" letter-spacing="-1">Sell Your House Fast</text>
  <text x="80" y="276" font-family="Georgia, serif" font-size="64" fill="#2f3130" font-weight="500" letter-spacing="-1">for Cash.</text>

  <!-- Subheadline -->
  <text x="80" y="340" font-family="system-ui, sans-serif" font-size="24" fill="#71746e" font-weight="400">Fair offer in 24 hours. No repairs. No fees. No agents.</text>

  <!-- Divider line -->
  <line x1="80" y1="390" x2="500" y2="390" stroke="#a47551" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Service areas badges -->
  <!-- Badge 1 -->
  <rect x="80" y="415" width="210" height="44" rx="22" fill="#2f3130"/>
  <text x="185" y="443" font-family="system-ui, sans-serif" font-size="15" fill="#edede9" text-anchor="middle" font-weight="500">Orange County</text>

  <!-- Badge 2 -->
  <rect x="304" y="415" width="210" height="44" rx="22" fill="#2f3130"/>
  <text x="409" y="443" font-family="system-ui, sans-serif" font-size="15" fill="#edede9" text-anchor="middle" font-weight="500">Los Angeles County</text>

  <!-- Badge 3 -->
  <rect x="528" y="415" width="180" height="44" rx="22" fill="#2f3130"/>
  <text x="618" y="443" font-family="system-ui, sans-serif" font-size="15" fill="#edede9" text-anchor="middle" font-weight="500">Inland Empire</text>

  <!-- Bottom bar -->
  <rect x="0" y="530" width="1200" height="100" fill="#2f3130"/>

  <!-- Logo area (right side of bottom bar) -->
  <text x="80" y="592" font-family="Georgia, serif" font-size="28" fill="#edede9" font-weight="500">Father &amp; Son Home Buyers</text>
  <text x="1120" y="574" font-family="system-ui, sans-serif" font-size="14" fill="#a47551" text-anchor="end">fathersonhomes.com</text>
  <text x="1120" y="596" font-family="system-ui, sans-serif" font-size="14" fill="#edede9" text-anchor="end" opacity="0.6">(949) 541-2003</text>

  <!-- Right decorative element: house outline -->
  <g transform="translate(900, 140)" opacity="0.08">
    <path d="M150 220 L150 100 L250 20 L350 100 L350 220 Z" fill="none" stroke="#2f3130" stroke-width="8"/>
    <path d="M200 220 L200 160 L300 160 L300 220" fill="none" stroke="#2f3130" stroke-width="8"/>
    <path d="M250 20 L250 0" fill="none" stroke="#2f3130" stroke-width="6"/>
    <rect x="210" y="100" width="40" height="40" fill="none" stroke="#2f3130" stroke-width="6"/>
    <rect x="275" y="100" width="40" height="40" fill="none" stroke="#2f3130" stroke-width="6"/>
  </g>
</svg>
